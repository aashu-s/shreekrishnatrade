<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Shree Krishna Services</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../img/favicon.png">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>

<body>

    <div class="login-card text-center">
        <div class="mb-4">
            <i class="fas fa-user-shield fa-3x text-primary"></i>
            <h3 class="mt-2 text-dark">Admin Access</h3>
        </div>
        <form id="adminLoginForm">
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
        </form>
        <div class="mt-3 text-start">
            <a href="../index.html" class="text-decoration-none small text-muted"><i class="fas fa-arrow-left"></i> Back
                to Site</a>
        </div>
    </div>

    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Signing in...';
            btn.disabled = true;

            try {
                const formData = new FormData(this);
                const response = await fetch('../backend/process-admin-login.php', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.success) {
                    // Redirect to dashboard (assuming user/dashboard.php structure but usually admin has its own)
                    // For now request said "redirect to admin/dashboard.php on success"
                    // I haven't created admin/dashboard.php, but will point there.
                    window.location.href = result.data.redirect || 'dashboard.php';
                } else {
                    alert(result.message);
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            } catch (err) {
                alert('Connection error');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
    <!-- FLOATING BUTTONS -->
    <div class="floating-container">
        <button id="themeToggle" class="float-btn btn-theme" title="Toggle Theme"><i class="fas fa-moon"></i></button>
        <a href="https://wa.me/9779767990237" target="_blank" class="float-btn btn-whatsapp" title="WhatsApp Us"><i
                class="fab fa-whatsapp"></i></a>
        <a href="tel:+9779767990237" class="float-btn btn-call" title="Call Now"><i class="fas fa-phone"></i></a>
        <button id="scrollToTop" class="float-btn btn-scroll-top" title="Scroll to Top"><i
                class="fas fa-arrow-up"></i></button>
        <button id="chatbotToggle" class="float-btn btn-primary" title="Chat with us"><i
                class="fas fa-comments"></i></button>
    </div>

    <!-- CHATBOT WIDGET -->
    <div id="chatbotWidget" class="chatbot-container">
        <div class="chatbot-header" id="chatbotHeader">
            <span><i class="fas fa-robot me-2"></i> Support Assistant</span>
            <i class="fas fa-times"></i>
        </div>
        <div class="chatbot-body" id="chatbotBody">
            <div class="bot-msg">Namaste! How can I help you today?</div>
            <!-- Chat log -->
        </div>
        <div class="chatbot-options p-2" id="chatbotOptions">
            <!-- Dynamic options -->
        </div>
    </div>

    <script src="../js/store.js"></script>
    <script src="../js/main.js"></script>
</body>


</html>
